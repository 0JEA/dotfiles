# ==============================================================================
# TMUX CONFIGURATION (.tmux.conf)
# ==============================================================================
# This configuration file defines the look, feel, and behavior of tmux.
# It is designed to be easily modified by LLMs and human users.
# ==============================================================================

# --- TERMINAL & COLOR SETTINGS ---
# Use screen-256color for broad compatibility
set -g default-terminal "screen-256color"
# Enable RGB/TrueColor support
set -ag terminal-overrides ",xterm-256color:RGB"

# --- KEY BINDINGS ---
# Set the prefix to Ctrl-a (more ergonomic than Ctrl-b)
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Reload config with 'r' key (useful for rapid testing)
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- MOUSE & STATUS BEHAVIOR ---
set -g mouse on
set -g status on
set -g status-interval 1  # Refresh status line every second
set -g destroy-unattached on # Kill session when terminal window is closed

# --- TOKYO NIGHT PRO PALETTE (Reference) ---
# BG: #1a1b26 | BLUE: #7aa2f7 | CYAN: #7dcfff | MAGENTA: #bb9af7 | GRAY: #3b4261

# --- STATUS BAR LAYOUT ---
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default"
set -g status-left-length 200 # Allow long paths without truncation
set -g status-right ""
set -g status-right-length 0   # Keep right side clean for now

# --- LEFT SIDE: THE CONNECTED PATH CHAIN ---
# This invokes the external bash script to generate the colored breadcrumbs.
# The script takes the current pane path as its first argument.
set -g status-left "#(bash ~/.tmux/path_pills.sh \"#{pane_current_path}\")"

# --- WINDOW LIST STYLING (The Middle Section) ---
# Currently hidden to keep the status bar focused on the path breadcrumbs.
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""

# --- MESSAGE & BORDER STYLING ---
# Colors used for messages (like "Config reloaded!") and pane borders.
set -g message-style "fg=#7aa2f7,bg=#3b4261,bold"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# --- PLUGIN MANAGEMENT (TPM) ---
# TPM: Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TPM (Keep this at the very bottom of the file)
run '~/.tmux/plugins/tpm/tpm'
